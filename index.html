  <!-- ── Google Translate – suppress default toolbar ── -->
  <style>
    /* Hide Google's injected top bar */
    .goog-te-banner-frame.skiptranslate {
      display: none !important;
    }

    body {
      top: 0 !important;
    }

    /* Hide the "Translated by Google" popup badge */
    .goog-te-gadget-icon,
    .goog-logo-link,
    .goog-te-gadget span,
    #goog-gt-tt,
    .goog-te-balloon-frame {
      display: none !important;
    }

    /* Keep the hidden select wrapper invisible */
    #google_translate_element {
      display: none !important;
    }

    /* Smooth font rendering after translation */
    .translated-ltr,
    .translated-rtl {
      font-family: inherit !important;
    }
